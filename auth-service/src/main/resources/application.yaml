server:
  port: 8080

spring:
  application:
    name: auth-token-provider

app:
  table-name: ${STATE_TABLE_NAME:prod-core-lab-state}
  token-ttl-seconds: ${TOKEN_TTL_SECONDS:900}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
