server:
  port: 8080

spring:
  application:
    name: auth-token-provider

app:
  table-name: ${STATE_TABLE_NAME:prod-core-lab-state}
  token-ttl-seconds: ${TOKEN_TTL_SECONDS:900}

observability:
  slow-request-threshold-ms: ${SLOW_REQUEST_THRESHOLD_MS:1000}

logging:
  pattern:
    level: "%5p service=${spring.application.name} traceId=%X{traceId:-} spanId=%X{spanId:-} requestId=%X{requestId:-} xrayTraceId=%X{xrayTraceId:-} jobId=%X{jobId:-} messageId=%X{messageId:-} producerTraceId=%X{producerTraceId:-} producerSpanId=%X{producerSpanId:-}"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
