server:
  port: 8091

spring:
  application:
    name: auth-filter-lab
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    org.springframework: INFO
  pattern:
    level: "%5p requestId=%X{requestId:-} subject=%X{subject:-} tokenHash=%X{tokenHash:-}"
