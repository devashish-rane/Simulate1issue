server:
  port: 8080

spring:
  application:
    name: worker-service

app:
  table-name: ${JOB_TABLE_NAME:prod-core-lab-state}
  queue-url: ${JOB_QUEUE_URL:}
  poll-delay-ms: ${WORKER_POLL_DELAY_MS:1000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
